framework:
    rate_limiter:
        contact_form:
            policy: 'sliding_window'
            limit: 3
            interval: '1 minute'
        activation_link:
            policy: 'fixed_window'
            limit: 10
            interval: '1 hour'
        resend_activation:
            policy: 'sliding_window'
            limit: 3
            interval: '15 minutes'
        forgot_password:
            policy: 'sliding_window'
            limit: 3
            interval: '15 minutes'
        global_api:
            policy: 'sliding_window'
            limit: 100
            interval: '1 minute'
            cache_pool: cache.rate_limiter